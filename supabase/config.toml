# Supabase local development config
# Run `supabase start` to spin up a local Postgres + Studio instance
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "wash360"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:8081"    # Expo dev server
additional_redirect_urls = ["wash360://"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false          # disable for local dev convenience

[edge_runtime]
enabled = true
